  <body>
    <script>
      function solution(a, b, c) {
        let answer = true,
          max;
        let sum = a + b + c;
        if (a < b) max = b;
        else max = a;
        if (max < c) max = c;

        if (max >= sum - max) answer = false;

        console.log(answer);
        return answer;
      }
      solution(7, 5, 11);
    </script>
