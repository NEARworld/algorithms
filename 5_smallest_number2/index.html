<html>
  <head>
    <title>출력 결과</title>
  </head>
  <body>
    <script>
      function solution(arr) {
        let answer = arr[0];

        for (let i = 1; i < arr.length; i++) {
          if (answer > arr[i]) answer = arr[i];
        }
        return answer;
      }
      console.log(solution([2, 4, 3, 6, 5, 1, 7]));
    </script>
  </body>
</html>
