<html>
  <head>
    <title>출력 결과</title>
  </head>
  <body>
    <script>
      function solution(arr) {
        let answer = [];
        let sum = 0;
        let odds = [];
        for (let i = 0; i < arr.length; i++) {
          if (arr[i] % 2 > 0) {
            sum += arr[i];
            odds.push(arr[i]);
          }
        }
        let min = Math.min(...odds);
        answer = [sum, min];
        return answer;
      }
      console.log(solution([12, 77, 38, 41, 53, 92, 85]));
    </script>
  </body>
</html>
