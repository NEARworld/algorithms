<html>
  <head>
    <title>출력 결과</title>
  </head>
  <body>
    <script>
      function solution(day, arr) {
        let answer = 0;
        for (let x of arr) {
          //   if (x - day === 0) answer++;
          if (x % 10 === day) answer++;
        }
        return answer;
      }
      console.log(solution(3, [25, 23, 11, 47, 53, 17, 33]));
    </script>
  </body>
</html>
